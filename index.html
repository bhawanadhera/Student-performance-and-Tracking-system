<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Teacher Dashboard - SBPTS</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
</head>
<body class="dashboard-body">
<header class="top-bar shadow-sm d-flex align-items-center justify-content-between px-4">
  <div class="d-flex align-items-center">
    <button class="back-btn me-3" onclick="window.location.href='role.html'"><span>&larr;</span></button>
    <div>
      <h4 class="mb-0">Teacher Dashboard</h4>
      <small class="text-muted">Quick performance entry</small>
    </div>
  </div>
</header>

<div class="container py-4">
  <!-- Teacher Login -->
  <div id="login-section" class="auth-card card mx-auto p-4" style="max-width: 500px;">
    <h5 class="mb-3 text-center">Class Login</h5>
    <input id="teacherEmail" class="form-control mb-2" placeholder="Teacher Email">
    <input id="className" class="form-control mb-2" placeholder="Class Name (e.g. 7-A)">
    <input id="classCode" class="form-control mb-3" placeholder="Class Code (e.g. ENG-7A)">
    <button class="btn btn-accent w-100" onclick="teacherLogin()">Enter Dashboard</button>
  </div>

  <!-- Main Dashboard -->
  <div id="teacher-dashboard" style="display:none;">
    <div class="row g-4">
      <!-- Add New Student -->
      <div class="col-lg-4">
        <div class="card p-3 shadow-sm border-0 h-100">
          <h6 class="mb-3">➕ Add New Student <span class="badge bg-light text-dark small" id="class-badge"></span></h6>
          
          <input id="studentName" class="form-control mb-2" placeholder="Student Full Name">
          <input id="studentRoll" class="form-control mb-2" placeholder="Roll Number">
          
          <select id="studentGender" class="form-select mb-3">
            <option value="">Select Gender</option>
            <option value="Male">👦 Male</option>
            <option value="Female">👧 Female</option>
          </select>
          
          <button class="btn btn-success w-100 mb-3" onclick="addStudent()">
            Add Student
          </button>

          <h6 class="mb-2 small">Students Added</h6>
          <ul id="student-list" class="list-group list-group-flush small" style="max-height: 200px; overflow-y: auto;"></ul>
        </div>
      </div>

      <!-- Performance Entry -->
      <div class="col-lg-8">
        <div class="card p-4 shadow-sm border-0">
          <h5 class="mb-3">📊 Daily Performance Record</h5>
          
          <!-- Performance Form -->
          <div id="performance-form">
            <div class="row mb-3">
              <div class="col-md-6">
                <label class="form-label fw-bold">Roll Number <span class="text-danger">*</span></label>
                <input id="rollNumber" class="form-control" placeholder="e.g. 01" required>
              </div>
              <div class="col-md-6">
                <label class="form-label fw-bold">Date <span class="text-danger">*</span></label>
                <input type="date" id="recordDate" class="form-control" required>
              </div>
            </div>

            <div class="row g-2 mb-3">
              <div class="col-md-6">
                <label class="form-label">Assessment Marks</label>
                <input id="assessmentMarks" class="form-control" placeholder="e.g. 85/100">
              </div>
              <div class="col-md-6">
                <label class="form-label fw-bold">Attendance <span class="text-danger">*</span></label>
                <select id="attendance" class="form-select" required>
                  <option value="">Select...</option>
                  <option value="Present">✅ Present</option>
                  <option value="Late">⏰ Late</option>
                  <option value="Absent">❌ Absent</option>
                  <option value="Half Day">⏳ Half Day</option>
                </select>
              </div>
            </div>

            <div class="mb-3">
              <label class="form-label">Behavioural Notes</label>
              <input id="behavioural" class="form-control" placeholder="e.g. Attentive, Participated actively">
            </div>

            <div class="mb-3">
              <label class="form-label">Overall Notes Today</label>
              <textarea id="overallNotes" class="form-control" rows="3" placeholder="Today's observations, homework status..."></textarea>
            </div>

            <div class="mb-4">
              <label class="form-label">📸 Attach Images (Homework/Assessment proof)</label>
              <input type="file" id="recordImages" class="form-control" multiple accept="image/*">
            </div>

            <button class="btn btn-accent w-100 btn-lg" onclick="savePerformance()">
              💾 Save Performance Record
            </button>
          </div>

          <!-- ⭐ SUCCESS MESSAGE WITH BUTTONS -->
          <div id="success-message" class="text-center p-4 border rounded-3 bg-success bg-opacity-10 border-success" style="display:none;">
            <div class="mb-4">
              <i class="bi bi-check-circle-fill display-4 text-success mb-3"></i>
              <h4 class="text-success mb-2">✅ تمام ریکارڈ محفوظ ہو گئے ہیں!</h4>
              <p class="text-success-emphasis mb-0">Performance record successfully saved!</p>
            </div>
            
            <div class="d-grid gap-2 d-md-flex justify-content-center">
              <button class="btn btn-success btn-lg flex-fill" onclick="addAnotherRecord()">
                ➕ Add Another Record
              </button>
              <button class="btn btn-outline-secondary btn-lg flex-fill" onclick="exitToDashboard()">
                🚪 Exit to Dashboard
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
