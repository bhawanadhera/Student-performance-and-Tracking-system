<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Principal Dashboard - SBPTS</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body class="dashboard-body">
<header class="top-bar shadow-sm d-flex align-items-center justify-content-between px-4">
  <div class="d-flex align-items-center">
    <button class="back-btn me-3" onclick="window.location.href='role.html'"><span>&larr;</span></button>
    <div>
      <h4 class="mb-0">Principal Dashboard</h4>
      <small class="text-muted">View class performance reports</small>
    </div>
  </div>
</header>

<div class="container py-4">
  <!-- Principal Login -->
  <div id="principal-login" class="auth-card card mx-auto p-4" style="max-width: 500px;">
    <h5 class="mb-3 text-center">View Class Records</h5>
    <input id="principalClassName" class="form-control mb-2" placeholder="Class Name (e.g. 7-A)">
    <input id="principalClassCode" class="form-control mb-3" placeholder="Class Code (e.g. ENG-7A)">
    <button class="btn btn-accent w-100" onclick="principalLogin()">View Records</button>
  </div>

  <!-- Records Display -->
  <div id="principal-dashboard" style="display:none;">
    <div class="card p-4 shadow-sm border-0 mb-4">
      <div class="d-flex justify-content-between align-items-center mb-4">
        <h5 class="mb-0" id="principal-class-title"></h5>
        <span class="badge bg-light text-dark fs-6" id="principal-class-badge"></span>
      </div>
      
      <div id="records-container" class="row g-4">
        <!-- Records will load here -->
      </div>
    </div>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
